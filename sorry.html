<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Efenim, Bağışla? 😓</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: #142a4a;
            background-image: 
                linear-gradient(rgba(20, 42, 74, 0.9), rgba(20, 42, 74, 0.9)),
                url('data:image/svg+xml,%3Csvg width="42" height="44" viewBox="0 0 42 44" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="none" fill-rule="evenodd"%3E%3Cg fill="%23ffffff" fill-opacity="0.05"%3E%3Cpath d="M0 0h42v44H0V0zm1 1h40v42H1V1zM11 2h20v20H11V2zM0 24h20v20H0V24zm22 0h20v20H22V24z"/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .roblox-card {
            background: #f1f3f5;
            box-shadow: 10px 10px 0 #111;
            border-radius: 12px;
            border: 4px solid #111;
            transition: all 0.3s ease;
        }

        .roblox-h1 {
            font-weight: 900;
            text-transform: uppercase;
            color: #111;
            text-shadow: 2px 2px 0 #fff;
        }

        .roblox-p {
            color: #333;
            font-weight: 700;
            line-height: 1.5;
        }

        .image-container {
            width: 150px;
            height: 150px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            border: 4px solid #111;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .image-container img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }

        .roblox-btn {
            font-weight: 900;
            text-transform: uppercase;
            border: 4px solid #111;
            box-shadow: 6px 6px 0 #111;
            transition: all 0.1s ease;
        }

        .roblox-btn:hover {
            box-shadow: 3px 3px 0 #111;
            transform: translate(2px, 2px);
        }

        .roblox-btn:active {
            box-shadow: 1px 1px 0 #111;
            transform: translate(4px, 4px);
        }

        footer {
            position: fixed;
            bottom: 20px;
            text-align: center;
            color: #fff;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        footer a {
            text-decoration: underline;
        }
    </style>
</head>
<body class="p-4">

    <div class="roblox-card w-full max-w-md p-8 text-center relative z-10">
        
        <div id="step-1">
            <div class="image-container mb-6">
                <img src="https://media.giphy.com/media/L95W4wv8nnb9K/giphy.gif" alt="Sad Cat">
            </div>

            <h1 class="roblox-h1 text-2xl mb-4">Efenim, Bağışla😓</h1>
            <p class="roblox-p text-md mb-8 px-2">
                Efenim sənə cahil dediyim üçün və istəmədəndə olsa qəlbini qırdığım üçün məni bağışla😓
            </p>

            <div class="flex flex-col gap-4 relative h-32 justify-start items-center">
                <button onclick="acceptApology()" class="roblox-btn bg-[#2ecc71] text-white py-3 px-10 rounded-lg text-lg w-full sm:w-auto z-20">
                    Bağışladım 👍
                </button>
                
                <button id="no-btn" class="roblox-btn bg-[#818ea1] text-white py-2 px-6 rounded-lg text-sm whitespace-nowrap">
                    Xeyr
                </button>
            </div>
        </div>

        <div id="step-2" class="hidden opacity-0 transform scale-90 transition-all duration-500">
            <div class="image-container mb-6 border-[#2ecc71]">
                <img src="https://media.giphy.com/media/10UeedrT5MIfYE/giphy.gif" alt="Happy Cat">
            </div>
            
            <h1 class="roblox-h1 text-4xl mb-4">yupiiiii🎉</h1>
            <p class="roblox-p text-lg mb-6">
                bi daha sənə cahil desəm məni döy😔
            </p>
            
            <button onclick="location.reload()" class="text-xs text-[#555] underline mt-4">
                Yenidən bax
            </button>
        </div>
    </div>

    <footer>
        Hazırlayan: <a href="https://instagram.com/ali_hsyn3" target="_blank">ASTEROİD DESTROYER GALACTİCUS</a>
    </footer>

    <script>
        const noBtn = document.getElementById('no-btn');
        
        function moveButton() {
            noBtn.innerText = "Bağışlamalısan 😜";
            noBtn.classList.add('bg-red-600');

            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;
            const padding = 40;

            const maxLeft = windowWidth - btnWidth - padding;
            const maxTop = windowHeight - btnHeight - padding;

            const randomLeft = Math.max(padding, Math.random() * maxLeft);
            const randomTop = Math.max(padding, Math.random() * maxTop);

            noBtn.style.position = 'fixed';
            noBtn.style.left = randomLeft + 'px';
            noBtn.style.top = randomTop + 'px';
            noBtn.style.zIndex = '100'; 
        }

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveButton();
        });

        function acceptApology() {
            const step1 = document.getElementById('step-1');
            const step2 = document.getElementById('step-2');

            noBtn.style.display = 'none';
            step1.style.display = 'none';
            step2.classList.remove('hidden');
            
            setTimeout(() => {
                step2.classList.remove('opacity-0', 'transform', 'scale-90');
            }, 50);

            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 }
            });
        }
    </script>
</body>
</html>
